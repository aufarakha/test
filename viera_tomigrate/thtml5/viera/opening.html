<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIERA - Opening</title>
  <link rel="stylesheet" href="../css/style.css" />
  <!-- Sesuaikan path CSS jika perlu -->
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #f9f9f9;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      /* Biar tombol selalu di bawah */
      align-items: center;
    }

    /* Tombol yang selalu di bawah tapi sedikit naik */
    .visible-button {
      position: relative;
      margin-bottom: 5px;
      /* Naik dikit dari bawah */
      padding: 10px 30px;
      font-size: 12px;
      font-weight: bold;
      color: #000;
      background-color: #fff;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
    }

    .visible-button:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>

<body>
  <!-- Tombol yang selalu terlihat di bagian bawah -->
  <button id="nextButton" class="visible-button" onclick="nextPage()">
    Selanjutnya
  </button>

  <script>
    // Daftar gambar dengan path relatif dari folder viera ke assets/image
    const images = [
      "../assets/image/opening1.png",
      "../assets/image/opening3.png",
      "../assets/image/opening4.png", // Ubah teks tombol saat ini
      "../assets/image/opening5.png",
      "../assets/image/opening6.png",
    ];

    let currentIndex = 0;

    // Fungsi untuk memperbarui background
    function updateBackground() {
      document.body.style.backgroundImage = `url('${images[currentIndex]}')`;

      const button = document.getElementById("nextButton");
      if (currentIndex === 2) {
        button.innerText = "Setuju";
      } else {
        button.innerText = "Selanjutnya";
      }
    }

    // Panggil pertama kali
    updateBackground();

    function nextPage() {
      if (currentIndex < images.length - 1) {
        currentIndex++;
        updateBackground();
      } else {
        // Setelah opening selesai, pindah ke opening2.html
        window.location.href = "opening2.html";
      }
    }

    function toggleFullScreen() {
      var doc = window.document;
      var docEl = doc.documentElement;

      var requestFullScreen =
        docEl.requestFullscreen ||
        docEl.mozRequestFullScreen ||
        docEl.webkitRequestFullScreen ||
        docEl.msRequestFullscreen;
      var exitFullScreen =
        doc.exitFullscreen ||
        doc.mozCancelFullScreen ||
        doc.webkitExitFullscreen ||
        doc.msExitFullscreen;

      if (
        !doc.fullscreenElement &&
        !doc.mozFullScreenElement &&
        !doc.webkitFullscreenElement &&
        !doc.msFullscreenElement
      ) {
        requestFullScreen.call(docEl);
      } else {
        exitFullScreen.call(doc);
      }
    }

    document.body.addEventListener("click", (_) => toggleFullScreen(), {
      once: true,
    });
  </script>
</body>

</html>
